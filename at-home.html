const WEIGHT_CONFIG = {
  critical: { label: "Essential", color: "#c0392b", bg: "rgba(192, 57, 43, 0.08)" },
  important: { label: "Important", color: "#d4880f", bg: "rgba(212, 136, 15, 0.08)" },
  helpful: { label: "Helpful", color: "#2471a3", bg: "rgba(36, 113, 163, 0.08)" }
};

const STATUS_OPTIONS = [
  { value: "yes", label: "Yes", icon: "\u25CF" },
  { value: "partial", label: "Partially", icon: "\u25D0" },
  { value: "no", label: "No", icon: "\u25CB" },
  { value: "unsure", label: "Unsure", icon: "?" },
  { value: "na", label: "N/A", icon: "\u2014" }
];

function ValiChordAtHome() {
  const [phase, setPhase] = useState("intro");
  const [currentCategory, setCurrentCategory] = useState(0);
  const [answers, setAnswers] = useState({});
  const [repoName, setRepoName] = useState("");
  const [animating, setAnimating] = useState(false);

  const setAnswer = (questionId, value) => {
    setAnswers(prev => ({ ...prev, [questionId]: value }));
  };

  const currentCat = CATEGORIES[currentCategory];
  const allQuestionIds = CATEGORIES.flatMap(c => c.questions.map(q => q.id));
  const answeredCount = allQuestionIds.filter(id => answers[id]).length;
  const totalQuestions = allQuestionIds.length;

  const navigateCategory = (dir) => {
    setAnimating(true);
    setTimeout(() => {
      setCurrentCategory(prev => prev + dir);
      setAnimating(false);
    }, 150);
  };

  const generateReport = () => {
    const present = [];
    const missing = [];
    const partial = [];
    const unsure = [];

    CATEGORIES.forEach(cat => {
      cat.questions.forEach(q => {
        const a = answers[q.id];
        const item = { ...q, category: cat.title, categoryIcon: cat.icon };
        if (a === "yes") present.push(item);
        else if (a === "partial") partial.push(item);
        else if (a === "no") missing.push(item);
        else if (a === "unsure") unsure.push(item);
      });
    });

    const criticalMissing = missing.filter(q => q.weight === "critical");
    const criticalPartial = partial.filter(q => q.weight === "critical");
    const criticalUnsure = unsure.filter(q => q.weight === "critical");

    return { present, missing, partial, unsure, criticalMissing, criticalPartial, criticalUnsure };
  };

  const exportMarkdown = () => {
    const report = generateReport();
    const date = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    const name = repoName || "Repository";

    let md = `# ValiChord at Home \u2014 Readiness Report\n\n`;
    md += `**Repository:** ${name}\n`;
    md += `**Date:** ${date}\n`;
    md += `**Summary:** ${report.present.length} present, ${report.partial.length} partial, ${report.unsure.length} unsure, ${report.missing.length} missing\n\n`;
    md += `---\n\n`;

    if (report.criticalMissing.length > 0 || report.criticalUnsure.length > 0) {
      md += `## \u26A0 Critical Gaps\n\n`;
      md += `${report.criticalMissing.length + report.criticalUnsure.length} essential item(s) missing or unknown. `;
      md += `A validator would likely be blocked by these issues.\n\n`;
    }

    if (report.missing.length > 0) {
      md += `## Missing\n\n`;
      report.missing.forEach(q => {
        md += `### ${q.categoryIcon} ${q.category} \u2014 ${WEIGHT_CONFIG[q.weight].label}\n\n`;
        md += `**${q.text}**\n\n`;
        md += `${q.guidance}`;
        if (q.link) md += ` [${q.linkText}](${q.link})`;
        md += `\n\n`;
      });
    }

    if (report.unsure.length > 0) {
      md += `## Unsure\n\n`;
      md += `These items need checking \u2014 uncertainty about whether something exists is itself a reproducibility risk.\n\n`;
      report.unsure.forEach(q => {
        md += `- **${q.categoryIcon} ${q.category}** (${WEIGHT_CONFIG[q.weight].label}): ${q.text}\n`;
      });
      md += `\n`;
    }

    if (report.partial.length > 0) {
      md += `## Partially Addressed\n\n`;
      report.partial.forEach(q => {
        md += `- **${q.categoryIcon} ${q.category}** (${WEIGHT_CONFIG[q.weight].label}): ${q.text}\n`;
      });
      md += `\n`;
    }

    if (report.present.length > 0) {
      md += `## Present\n\n`;
      report.present.forEach(q => {
        md += `- \u2713 ${q.categoryIcon} ${q.text}\n`;
      });
      md += `\n`;
    }

    md += `---\n\n`;
    md += `*Generated by ValiChord at Home (Stage A). Based on FAIR principles, The Turing Way, and Software Sustainability Institute guidelines. `;
    md += `This report identifies readiness, not whether results will reproduce.*\n`;

    const blob = new Blob([md], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `valichord-report-${(repoName || "repository").toLowerCase().replace(/[^a-z0-9]/g, "-")}-${new Date().toISOString().split("T")[0]}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // --- INTRO ---
  if (phase === "intro") {
    return (
      <div style={{
        minHeight: "100vh",
        background: "#fafaf8",
        fontFamily: "'Newsreader', 'Georgia', serif",
        color: "#1a1a18"
      }}>
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "60px 24px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{
                fontSize: 11,
                letterSpacing: "0.15em",
                textTransform: "uppercase",
                color: "#888",
                fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif",
                marginBottom: 12
              }}>
                ValiChord
              </div>

              <h1 style={{
                fontSize: 38,
                fontWeight: 400,
                lineHeight: 1.2,
                margin: "0 0 8px 0",
                letterSpacing: "-0.01em"
              }}>
                At Home
              </h1>
            </div>
            <img src={LOGO_SRC} alt="ValiChord" style={{ width: 120, height: "auto", borderRadius: 8, opacity: 0.9 }} />
          </div>

          <div style={{
            width: 48,
            height: 2,
            background: "#1a1a18",
            margin: "24px 0 32px 0"
          }} />

          <p style={{
            fontSize: 19,
            lineHeight: 1.65,
            color: "#333",
            margin: "0 0 20px 0"
          }}>
            A reproducibility readiness check for your code repository.
          </p>

          <p style={{
            fontSize: 16,
            lineHeight: 1.7,
            color: "#555",
            margin: "0 0 16px 0"
          }}>
            This tool asks you simple, answerable questions about your repository
            and produces a report &mdash; not a score &mdash; showing what a validator would
            need to find, what's present, what's missing, and how to fix each gap.
            It's a safe place to discover problems early, before anyone else sees them.
            Built on guidance from the UK Reproducibility Network, these questions check for the most common barriers to computational reproducibility.
          </p>

          <p style={{
            fontSize: 16,
            lineHeight: 1.7,
            color: "#555",
            margin: "0 0 16px 0"
          }}>
            24 questions across 6 categories. Takes about 5 minutes.
            Nothing is tracked, stored, or shared.
          </p>

          <p style={{
            fontSize: 15,
            lineHeight: 1.7,
            color: "#777",
            margin: "0 0 40px 0"
          }}>
            Use it on your own, or bring the report to a supervision meeting,
            a team discussion, or a pre-submission review. It supports the
            conversation &mdash; it doesn't replace judgement.
          </p>

          <div style={{ marginBottom: 32 }}>
            <label style={{
              display: "block",
              fontSize: 13,
              fontFamily: "'DM Sans', sans-serif",
              color: "#888",
              marginBottom: 8,
              letterSpacing: "0.03em"
            }}>
              Repository or project name (optional &mdash; for your report)
            </label>
            <input
              type="text"
              value={repoName}
              onChange={e => setRepoName(e.target.value)}
              placeholder="e.g. climate-model-2024"
              style={{
                width: "100%",
                maxWidth: 360,
                padding: "12px 16px",
                border: "1px solid #ddd",
                borderRadius: 4,
                fontSize: 16,
                fontFamily: "'DM Mono', 'Courier New', monospace",
                background: "#fff",
                color: "#1a1a18",
                outline: "none",
                boxSizing: "border-box"
              }}
              onFocus={e => e.target.style.borderColor = "#1a1a18"}
              onBlur={e => e.target.style.borderColor = "#ddd"}
            />
          </div>

          <button
            onClick={() => setPhase("assess")}
            style={{
              padding: "14px 36px",
              background: "#1a1a18",
              color: "#fafaf8",
              border: "none",
              borderRadius: 4,
              fontSize: 15,
              fontFamily: "'DM Sans', sans-serif",
              fontWeight: 500,
              cursor: "pointer",
              letterSpacing: "0.02em",
              transition: "background 0.2s"
            }}
            onMouseEnter={e => e.target.style.background = "#333"}
            onMouseLeave={e => e.target.style.background = "#1a1a18"}
          >
            Begin assessment
          </button>

          <div style={{
            marginTop: 64,
            paddingTop: 24,
            borderTop: "1px solid #e8e8e4",
            fontSize: 13,
            color: "#999",
            fontFamily: "'DM Sans', sans-serif",
            lineHeight: 1.6
          }}>
            <div style={{ marginBottom: 12 }}>
              <strong style={{ color: "#888" }}>This is not</strong> a certification tool, a journal compliance check,
              or a funder reporting mechanism. It is a private diagnostic &mdash; a way to see
              your repository through a validator's eyes before you share it with anyone.
            </div>
            <div>
              ValiChord at Home is based on established best practices
              (FAIR principles, The Turing Way, Software Sustainability Institute guidelines).
              It does not estimate validation difficulty or time. It tells you what any
              validator would need to find in your repository.
            </div>
          </div>
        </div>
      </div>
    );
  }

  // --- ASSESSMENT ---
  if (phase === "assess") {
    return (
      <div style={{
        minHeight: "100vh",
        background: "#fafaf8",
        fontFamily: "'Newsreader', 'Georgia', serif",
        color: "#1a1a18"
      }}>
        {/* Header */}
        <div style={{
          borderBottom: "1px solid #e8e8e4",
          padding: "16px 24px",
          position: "sticky",
          top: 0,
          background: "#fafaf8",
          zIndex: 10
        }}>
          <div style={{ maxWidth: 640, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{
              fontSize: 13,
              fontFamily: "'DM Sans', sans-serif",
              color: "#888",
              letterSpacing: "0.05em"
            }}>
              <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <img src={LOGO_SRC} alt="" style={{ width: 28, height: "auto", borderRadius: 3 }} />
                <span><span style={{ color: "#1a1a18", fontWeight: 500 }}>ValiChord</span> at Home
                {repoName && <span style={{ color: "#aaa" }}> &mdash; {repoName}</span>}</span>
              </span>
            </div>
            <div style={{
              fontSize: 13,
              fontFamily: "'DM Mono', monospace",
              color: "#888"
            }}>
              {answeredCount}/{totalQuestions}
            </div>
          </div>
        </div>

        {/* Progress */}
        <div style={{ background: "#e8e8e4", height: 2 }}>
          <div style={{
            height: 2,
            background: "#1a1a18",
            width: `${(answeredCount / totalQuestions) * 100}%`,
            transition: "width 0.4s ease"
          }} />
        </div>

        <div style={{ maxWidth: 640, margin: "0 auto", padding: "40px 24px" }}>
          {/* Category tabs */}
          <div style={{
            display: "flex",
            gap: 4,
            marginBottom: 40,
            flexWrap: "wrap"
          }}>
            {CATEGORIES.map((cat, i) => {
              const catDone = cat.questions.filter(q => answers[q.id]).length;
              const isActive = i === currentCategory;
              return (
                <button
                  key={cat.id}
                  onClick={() => { setAnimating(true); setTimeout(() => { setCurrentCategory(i); setAnimating(false); }, 150); }}
                  style={{
                    padding: "8px 14px",
                    border: isActive ? "1px solid #1a1a18" : "1px solid #ddd",
                    borderRadius: 3,
                    background: isActive ? "#1a1a18" : "transparent",
                    color: isActive ? "#fafaf8" : catDone === cat.questions.length ? "#666" : "#999",
                    fontSize: 13,
                    fontFamily: "'DM Sans', sans-serif",
                    cursor: "pointer",
                    transition: "all 0.2s",
                    fontWeight: isActive ? 500 : 400
                  }}
                >
                  {cat.icon} {cat.title}
                  {catDone === cat.questions.length && !isActive && " \u2713"}
                </button>
              );
            })}
          </div>

          {/* Category content */}
          <div style={{
            opacity: animating ? 0 : 1,
            transform: animating ? "translateY(8px)" : "translateY(0)",
            transition: "all 0.15s ease"
          }}>
            <h2 style={{
              fontSize: 28,
              fontWeight: 400,
              margin: "0 0 6px 0"
            }}>
              {currentCat.icon} {currentCat.title}
            </h2>
            <p style={{
              fontSize: 16,
              color: "#777",
              margin: "0 0 32px 0",
              fontStyle: "italic"
            }}>
              {currentCat.description}
            </p>

            {/* Questions */}
            {currentCat.questions.map((q) => {
              const answerColor = answers[q.id] === "yes" ? "#27ae60" : answers[q.id] === "no" ? "#c0392b" : answers[q.id] === "partial" ? "#d4880f" : answers[q.id] === "unsure" ? "#8e44ad" : WEIGHT_CONFIG[q.weight].color;
              const showGuidance = answers[q.id] === "no" || answers[q.id] === "partial" || answers[q.id] === "unsure";

              return (
                <div key={q.id} style={{
                  marginBottom: 28,
                  padding: "20px 24px",
                  background: answers[q.id] ? "#fff" : WEIGHT_CONFIG[q.weight].bg,
                  border: `1px solid ${answers[q.id] ? "#e8e8e4" : "#eee"}`,
                  borderRadius: 6,
                  borderLeft: `3px solid ${answerColor}`,
                  transition: "all 0.3s ease"
                }}>
                  <div style={{ marginBottom: 12 }}>
                    <span style={{
                      display: "inline-block",
                      fontSize: 10,
                      fontFamily: "'DM Sans', sans-serif",
                      fontWeight: 600,
                      textTransform: "uppercase",
                      letterSpacing: "0.1em",
                      color: WEIGHT_CONFIG[q.weight].color,
                      marginBottom: 6
                    }}>
                      {WEIGHT_CONFIG[q.weight].label}
                    </span>
                    <div style={{
                      fontSize: 16,
                      lineHeight: 1.55,
                      color: "#1a1a18"
                    }}>
                      {q.text}
                    </div>
                  </div>

                  {/* Answer buttons */}
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: showGuidance ? 16 : 0 }}>
                    {STATUS_OPTIONS.map(opt => {
                      const isSelected = answers[q.id] === opt.value;
                      const btnColor = opt.value === "yes" ? "#27ae60" : opt.value === "no" ? "#c0392b" : opt.value === "partial" ? "#d4880f" : opt.value === "unsure" ? "#8e44ad" : "#888";
                      return (
                        <button
                          key={opt.value}
                          onClick={() => setAnswer(q.id, opt.value)}
                          style={{
                            padding: "7px 14px",
                            border: isSelected ? `1.5px solid ${btnColor}` : "1px solid #ddd",
                            borderRadius: 3,
                            background: isSelected ? `${btnColor}11` : "#fff",
                            color: isSelected ? "#1a1a18" : "#999",
                            fontSize: 13,
                            fontFamily: "'DM Sans', sans-serif",
                            cursor: "pointer",
                            transition: "all 0.15s",
                            fontWeight: isSelected ? 500 : 400
                          }}
                        >
                          {opt.icon} {opt.label}
                        </button>
                      );
                    })}
                  </div>

                  {/* Guidance on No, Partial, or Unsure */}
                  {showGuidance && (
                    <div style={{
                      padding: "14px 16px",
                      background: "#fafaf8",
                      borderRadius: 4,
                      fontSize: 14,
                      lineHeight: 1.6,
                      color: "#555",
                      fontFamily: "'DM Sans', sans-serif",
                      borderLeft: answers[q.id] === "unsure" ? "2px solid #8e44ad" : "2px solid #ddd"
                    }}>
                      {answers[q.id] === "unsure" && (
                        <div style={{ marginBottom: 8, color: "#8e44ad", fontSize: 13, fontWeight: 500 }}>
                          If you're not sure, a validator won't be either. Worth checking before submission.
                        </div>
                      )}
                      {q.guidance}
                      {q.link && (
                        <div style={{ marginTop: 8 }}>
                          <a href={q.link} target="_blank" rel="noopener noreferrer" style={{
                            color: "#2471a3",
                            textDecoration: "none",
                            fontSize: 13,
                            borderBottom: "1px solid rgba(36,113,163,0.3)"
                          }}>
                            &rarr; {q.linkText}
                          </a>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Navigation */}
          <div style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            marginTop: 32,
            paddingTop: 24,
            borderTop: "1px solid #e8e8e4"
          }}>
            <button
              onClick={() => currentCategory > 0 && navigateCategory(-1)}
              disabled={currentCategory === 0}
              style={{
                padding: "10px 20px",
                border: "1px solid #ddd",
                borderRadius: 4,
                background: "transparent",
                color: currentCategory === 0 ? "#ccc" : "#666",
                fontSize: 14,
                fontFamily: "'DM Sans', sans-serif",
                cursor: currentCategory === 0 ? "default" : "pointer"
              }}
            >
              &larr; Previous
            </button>

            <span style={{
              fontSize: 13,
              fontFamily: "'DM Mono', monospace",
              color: "#aaa"
            }}>
              {currentCategory + 1} / {CATEGORIES.length}
            </span>

            {currentCategory < CATEGORIES.length - 1 ? (
              <button
                onClick={() => navigateCategory(1)}
                style={{
                  padding: "10px 20px",
                  border: "1px solid #1a1a18",
                  borderRadius: 4,
                  background: "#1a1a18",
                  color: "#fafaf8",
                  fontSize: 14,
                  fontFamily: "'DM Sans', sans-serif",
                  cursor: "pointer"
                }}
              >
                Next &rarr;
              </button>
            ) : (
              <button
                onClick={() => setPhase("report")}
                disabled={answeredCount < totalQuestions * 0.5}
                style={{
                  padding: "10px 24px",
                  border: "none",
                  borderRadius: 4,
                  background: answeredCount >= totalQuestions * 0.5 ? "#1a1a18" : "#ccc",
                  color: "#fafaf8",
                  fontSize: 14,
                  fontFamily: "'DM Sans', sans-serif",
                  fontWeight: 500,
                  cursor: answeredCount >= totalQuestions * 0.5 ? "pointer" : "default"
                }}
              >
                Generate report
              </button>
            )}
          </div>
        </div>
      </div>
    );
  }

  // --- REPORT ---
  if (phase === "report") {
    const report = generateReport();
    const hasCriticalGaps = report.criticalMissing.length > 0 || report.criticalUnsure.length > 0;
    const allClear = !hasCriticalGaps && report.criticalPartial.length === 0 && report.missing.length === 0 && report.unsure.length === 0;

    return (
      <div style={{
        minHeight: "100vh",
        background: "#fafaf8",
        fontFamily: "'Newsreader', 'Georgia', serif",
        color: "#1a1a18"
      }}>
        <div style={{ maxWidth: 640, margin: "0 auto", padding: "60px 24px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{
                fontSize: 11,
                letterSpacing: "0.15em",
                textTransform: "uppercase",
                color: "#888",
                fontFamily: "'DM Sans', sans-serif",
                marginBottom: 8
              }}>
                ValiChord at Home &mdash; Readiness Report
              </div>

              <h1 style={{
                fontSize: 32,
                fontWeight: 400,
                margin: "0 0 4px 0"
              }}>
                {repoName || "Your Repository"}
              </h1>
            </div>
            <img src={LOGO_SRC} alt="ValiChord" style={{ width: 80, height: "auto", borderRadius: 6, opacity: 0.9 }} />
          </div>

          <div style={{
            fontSize: 14,
            color: "#999",
            fontFamily: "'DM Sans', sans-serif",
            marginBottom: 32
          }}>
            {new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" })}
          </div>

          <div style={{ width: 48, height: 2, background: "#1a1a18", marginBottom: 32 }} />

          {/* Summary boxes */}
          <div style={{
            display: "grid",
            gridTemplateColumns: "1fr 1fr 1fr 1fr",
            gap: 12,
            marginBottom: 40
          }}>
            {[
              { count: report.present.length, label: "Present", color: "#27ae60" },
              { count: report.partial.length, label: "Partial", color: "#d4880f" },
              { count: report.unsure.length, label: "Unsure", color: "#8e44ad" },
              { count: report.missing.length, label: "Missing", color: "#c0392b" }
            ].map(s => (
              <div key={s.label} style={{
                padding: "16px 12px",
                background: "#fff",
                border: "1px solid #e8e8e4",
                borderRadius: 6,
                textAlign: "center"
              }}>
                <div style={{ fontSize: 28, fontWeight: 300, color: s.color, fontFamily: "'DM Mono', monospace" }}>
                  {s.count}
                </div>
                <div style={{ fontSize: 11, color: "#888", fontFamily: "'DM Sans', sans-serif", marginTop: 4 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Critical gaps warning */}
          {hasCriticalGaps && (
            <div style={{
              padding: "20px 24px",
              background: "rgba(192,57,43,0.04)",
              border: "1px solid rgba(192,57,43,0.15)",
              borderLeft: "3px solid #c0392b",
              borderRadius: 6,
              marginBottom: 32,
              fontSize: 15,
              lineHeight: 1.6
            }}>
              <div style={{
                fontFamily: "'DM Sans', sans-serif",
                fontWeight: 600,
                fontSize: 13,
                textTransform: "uppercase",
                letterSpacing: "0.08em",
                color: "#c0392b",
                marginBottom: 8
              }}>
                Critical gaps identified
              </div>
              <div style={{ color: "#555" }}>
                {report.criticalMissing.length + report.criticalUnsure.length} essential item(s) missing or unknown.
                A validator attempting to reproduce your work would likely be blocked by
                {" "}these issues before reaching the point of running your code.
              </div>
            </div>
          )}

          {allClear && (
            <div style={{
              padding: "20px 24px",
              background: "rgba(39,174,96,0.04)",
              border: "1px solid rgba(39,174,96,0.15)",
              borderLeft: "3px solid #27ae60",
              borderRadius: 6,
              marginBottom: 32,
              fontSize: 15,
              lineHeight: 1.6
            }}>
              <div style={{
                fontFamily: "'DM Sans', sans-serif",
                fontWeight: 600,
                fontSize: 13,
                textTransform: "uppercase",
                letterSpacing: "0.08em",
                color: "#27ae60",
                marginBottom: 8
              }}>
                Repository looks ready
              </div>
              <div style={{ color: "#555" }}>
                All items present. A validator should be able to find everything they need
                to attempt reproduction. This does not guarantee the code will reproduce &mdash;
                only that the prerequisites are in place.
              </div>
            </div>
          )}

          {/* Missing items */}
          {report.missing.length > 0 && (
            <div style={{ marginBottom: 36 }}>
              <h2 style={{ fontSize: 22, fontWeight: 400, margin: "0 0 16px 0" }}>Missing</h2>
              {report.missing.map(q => (
                <div key={q.id} style={{
                  padding: "16px 20px",
                  marginBottom: 10,
                  background: "#fff",
                  border: "1px solid #eee",
                  borderLeft: `3px solid ${WEIGHT_CONFIG[q.weight].color}`,
                  borderRadius: 4
                }}>
                  <div style={{ fontSize: 10, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.1em", color: WEIGHT_CONFIG[q.weight].color, marginBottom: 4 }}>
                    {q.categoryIcon} {q.category} &middot; {WEIGHT_CONFIG[q.weight].label}
                  </div>
                  <div style={{ fontSize: 15, marginBottom: 8, lineHeight: 1.5 }}>{q.text}</div>
                  <div style={{ fontSize: 13, color: "#666", fontFamily: "'DM Sans', sans-serif", lineHeight: 1.55 }}>
                    {q.guidance}
                    {q.link && <span> <a href={q.link} target="_blank" rel="noopener noreferrer" style={{ color: "#2471a3", textDecoration: "none", borderBottom: "1px solid rgba(36,113,163,0.3)" }}>{q.linkText} &rarr;</a></span>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Unsure items */}
          {report.unsure.length > 0 && (
            <div style={{ marginBottom: 36 }}>
              <h2 style={{ fontSize: 22, fontWeight: 400, margin: "0 0 8px 0" }}>Unsure</h2>
              <p style={{ fontSize: 14, color: "#777", fontFamily: "'DM Sans', sans-serif", marginBottom: 16, lineHeight: 1.6 }}>
                If you're not sure, a validator won't be either. These items are worth checking before submission.
              </p>
              {report.unsure.map(q => (
                <div key={q.id} style={{
                  padding: "16px 20px",
                  marginBottom: 10,
                  background: "#fff",
                  border: "1px solid #eee",
                  borderLeft: "3px solid #8e44ad",
                  borderRadius: 4
                }}>
                  <div style={{ fontSize: 10, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.1em", color: "#8e44ad", marginBottom: 4 }}>
                    {q.categoryIcon} {q.category} &middot; {WEIGHT_CONFIG[q.weight].label}
                  </div>
                  <div style={{ fontSize: 15, marginBottom: 8, lineHeight: 1.5 }}>{q.text}</div>
                  <div style={{ fontSize: 13, color: "#666", fontFamily: "'DM Sans', sans-serif", lineHeight: 1.55 }}>
                    {q.guidance}
                    {q.link && <span> <a href={q.link} target="_blank" rel="noopener noreferrer" style={{ color: "#2471a3", textDecoration: "none", borderBottom: "1px solid rgba(36,113,163,0.3)" }}>{q.linkText} &rarr;</a></span>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Partial items */}
          {report.partial.length > 0 && (
            <div style={{ marginBottom: 36 }}>
              <h2 style={{ fontSize: 22, fontWeight: 400, margin: "0 0 16px 0" }}>Partially addressed</h2>
              {report.partial.map(q => (
                <div key={q.id} style={{
                  padding: "16px 20px",
                  marginBottom: 10,
                  background: "#fff",
                  border: "1px solid #eee",
                  borderLeft: "3px solid #d4880f",
                  borderRadius: 4
                }}>
                  <div style={{ fontSize: 10, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.1em", color: "#d4880f", marginBottom: 4 }}>
                    {q.categoryIcon} {q.category} &middot; {WEIGHT_CONFIG[q.weight].label}
                  </div>
                  <div style={{ fontSize: 15, marginBottom: 8, lineHeight: 1.5 }}>{q.text}</div>
                  <div style={{ fontSize: 13, color: "#666", fontFamily: "'DM Sans', sans-serif", lineHeight: 1.55 }}>
                    {q.guidance}
                    {q.link && <span> <a href={q.link} target="_blank" rel="noopener noreferrer" style={{ color: "#2471a3", textDecoration: "none", borderBottom: "1px solid rgba(36,113,163,0.3)" }}>{q.linkText} &rarr;</a></span>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Present items */}
          {report.present.length > 0 && (
            <div style={{ marginBottom: 36 }}>
              <h2 style={{ fontSize: 22, fontWeight: 400, margin: "0 0 16px 0" }}>Present</h2>
              {report.present.map(q => (
                <div key={q.id} style={{
                  padding: "10px 16px",
                  marginBottom: 4,
                  background: "rgba(39,174,96,0.03)",
                  border: "1px solid rgba(39,174,96,0.1)",
                  borderRadius: 4,
                  fontSize: 14,
                  color: "#555",
                  display: "flex",
                  alignItems: "center",
                  gap: 10
                }}>
                  <span style={{ color: "#27ae60", fontSize: 16 }}>{"\u25CF"}</span>
                  <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#aaa", minWidth: 24 }}>{q.categoryIcon}</span>
                  {q.text}
                </div>
              ))}
            </div>
          )}

          {/* Export and actions */}
          <div style={{
            marginTop: 48,
            paddingTop: 24,
            borderTop: "1px solid #e8e8e4"
          }}>
            <div style={{ marginBottom: 24, display: "flex", gap: 12, flexWrap: "wrap" }}>
              <button
                onClick={exportMarkdown}
                style={{
                  padding: "12px 28px",
                  background: "#1a1a18",
                  color: "#fafaf8",
                  border: "none",
                  borderRadius: 4,
                  fontSize: 14,
                  fontFamily: "'DM Sans', sans-serif",
                  fontWeight: 500,
                  cursor: "pointer",
                  transition: "background 0.2s"
                }}
                onMouseEnter={e => e.target.style.background = "#333"}
                onMouseLeave={e => e.target.style.background = "#1a1a18"}
              >
                Download report (.md)
              </button>
              <button
                onClick={() => { setPhase("assess"); setCurrentCategory(0); }}
                style={{
                  padding: "12px 24px",
                  border: "1px solid #ddd",
                  borderRadius: 4,
                  background: "transparent",
                  color: "#666",
                  fontSize: 14,
                  fontFamily: "'DM Sans', sans-serif",
                  cursor: "pointer"
                }}
              >
                &larr; Edit answers
              </button>
              <button
                onClick={() => { setAnswers({}); setRepoName(""); setPhase("intro"); }}
                style={{
                  padding: "12px 24px",
                  border: "1px solid #ddd",
                  borderRadius: 4,
                  background: "transparent",
                  color: "#999",
                  fontSize: 14,
                  fontFamily: "'DM Sans', sans-serif",
                  cursor: "pointer"
                }}
              >
                Start over
              </button>
            </div>

            <p style={{
              fontSize: 14,
              color: "#999",
              fontFamily: "'DM Sans', sans-serif",
              lineHeight: 1.7,
              marginBottom: 16
            }}>
              This report identifies what's present in your repository, not whether your
              results will reproduce. Good documentation with incorrect code will still fail
              validation. Poor documentation with correct code will block a validator before
              they can discover the code works. Both matter.
            </p>

            <p style={{
              fontSize: 13,
              color: "#bbb",
              fontFamily: "'DM Sans', sans-serif",
              lineHeight: 1.6
            }}>
              ValiChord at Home is a free tool based on established best practices.
              It does not estimate validation difficulty or time &mdash; that requires empirical
              data from structured validation studies.
              Questions based on FAIR principles, The Turing Way, and Software
              Sustainability Institute guidelines.
            </p>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.render(
  React.createElement(ValiChordAtHome),
  document.getElementById("root")
);
</script>
</body>
</html>
